<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节日祝福生成器 - 主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #2a2a2a;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 1000px;
            width: 100%;
            padding: 30px;
            animation: fadeIn 0.5s ease-in;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }

        .left-section {
            flex: 1;
            min-width: 300px;
        }

        .right-section {
            flex: 1;
            min-width: 300px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .user-info {
            background: #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info span {
            color: #667eea;
            font-weight: 600;
        }

        .logout-btn {
            background: #444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #555;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-weight: 500;
        }

        select, input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #444;
            border-radius: 10px;
            font-size: 16px;
            background: #333;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        select:hover, input:hover {
            border-color: #555;
        }

        select::placeholder, input::placeholder {
            color: #777;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .result {
            background: #333;
            border-radius: 15px;
            padding: 25px;
            display: none;
            min-height: 300px;
            flex: 1;
            flex-direction: column;
            justify-content: flex-start;
        }

        .result.show {
            display: flex;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes loadingBar {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(350%);
            }
        }

        .blessing-text {
            color: #fff;
            line-height: 1.8;
            font-size: 16px;
            text-align: left;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .left-section,
            .right-section {
                width: 100%;
            }
        }

        .copy-btn {
            margin-top: 15px;
            background: #28a745;
        }

        .copy-btn:hover {
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .emoji {
            font-size: 40px;
            text-align: center;
            margin-bottom: 15px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
                border-radius: 15px;
            }

            h1 {
                font-size: 24px;
            }

            select, input, .btn {
                font-size: 15px;
            }

            .blessing-text {
                font-size: 15px;
            }
        }

        .loading {
            display: none;
            background: #333;
            border-radius: 15px;
            padding: 25px;
            min-height: 300px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            animation: fadeIn 0.3s ease-in;
        }

        .placeholder {
            background: #333;
            border-radius: 15px;
            padding: 25px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
    </style>
</head>

            </div>

            </div>

                <div style="color: #999; font-size: 14px;">请在左侧填写信息并生成祝福语</div>

    </div>

        function generateBlessing() {
            const holiday = document.getElementById('holiday').value;
            const name = document.getElementById('name').value.trim();
            const length = document.getElementById('length').value;
            const blessingData = blessings[holiday];
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const placeholder = document.getElementById('placeholder');
            
            // 立即显示加载动画
            loading.style.display = 'flex';
            
            // 隐藏其他元素
            result.classList.remove('show');
            result.style.display = 'none';
            placeholder.style.display = 'none';
            
            // 获取节日名称
            const holidayNames = {
                newyear: '新年/春节',
                midautumn: '中秋节',
                christmas: '圣诞节',
                birthday: '生日',
                valentine: '情人节',
                mother: '母亲节',
                father: '父亲节',
                teacher: '教师节'
            };
            
            const holidayName = holidayNames[holiday];
            const lengthDesc = {
                short: '1-2句简短',
                medium: '3-4句中等长度',
                long: '5-6句较长'
            };
            
            // 调用大模型API
            callLLMAPI(holidayName, name, lengthDesc[length]).then(blessingText => {
                document.getElementById('emoji').textContent = blessingData.emoji;
                document.getElementById('blessingText').textContent = blessingText;
                // 立即隐藏加载动画
                document.getElementById('loading').style.display = 'none';
                // 显示结果
                document.getElementById('result').style.display = 'flex';
                document.getElementById('result').classList.add('show');
            }).catch(() => {
                // 失败时使用本地祝福语
                const randomIndex = Math.floor(Math.random() * blessingData.texts.length);
                let blessingText = blessingData.texts[randomIndex];
                
                if (name) {
                    blessingText = name + '，' + blessingText;
                }
                
                document.getElementById('emoji').textContent = blessingData.emoji;
                document.getElementById('blessingText').textContent = blessingText;
                // 立即隐藏加载动画
                document.getElementById('loading').style.display = 'none';
                // 显示结果
                document.getElementById('result').style.display = 'flex';
                document.getElementById('result').classList.add('show');
            }).finally(() => {
                // 确保所有情况下都隐藏加载动画
                document.getElementById('loading').style.display = 'none';
            });
        }

        async function callLLMAPI(holiday, name, length) {
            // 生成提示词
            let prompt = `请生成一条${length}的${holiday}祝福语`;
            if (name) {
                prompt += `，收件人是${name}`;
            }
            prompt += '，语言要温暖、真诚，符合节日氛围。';
            
            // 调用后端代理接口
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('http://localhost:3001/api/generate-blessing', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        prompt: prompt
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`API调用失败: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) {
                    return data.choices[0].message.content.trim();
                } else {
                    throw new Error('API返回格式错误');
                }

                console.error('DeepSeek API调用失败:', error);

                const lengthKey = lengthMap[length] || 'medium';
                
                if (backupResponses[holiday] && backupResponses[holiday][lengthKey]) {
                    return backupResponses[holiday][lengthKey];
                }
                
                // 默认祝福语
                return `${name ? name + '，' : ''}节日快乐！愿你一切顺利，幸福安康！`;

        }

        function copyBlessing() {
            const blessingText = document.getElementById('blessingText').textContent;
            navigator.clipboard.writeText(blessingText).then(() => {
                alert('祝福语已复制到剪贴板！');
            }).catch(err => {
                const textarea = document.createElement('textarea');
                textarea.value = blessingText;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('祝福语已复制到剪贴板！');
            });
        }

        function clearBlessing() {
            const result = document.getElementById('result');
            const placeholder = document.getElementById('placeholder');
            
            // 隐藏结果
            result.classList.remove('show');
            result.style.display = 'none';
            
            // 显示占位符
            placeholder.style.display = 'flex';
        }
    </script>
