<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节日祝福生成器 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #2a2a2a;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
            padding: 40px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .auth-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .auth-buttons button {
            background: transparent;
            color: #999;
            border: none;
            padding: 8px 16px;
            font-size: 15px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .auth-buttons button:hover {
            color: #ccc;
        }

        .auth-buttons button.active {
            color: #fff;
        }

        .auth-buttons button.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: #667eea;
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #444;
            border-radius: 10px;
            font-size: 16px;
            background: #333;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        input:hover {
            border-color: #555;
        }

        input::placeholder {
            color: #777;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .error {
            color: #ff6b6b;
        }

        .success {
            color: #4ade80;
        }

        .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px;
                border-radius: 15px;
            }

            h1 {
                font-size: 24px;
            }

            input, .btn {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎊</div>
        <h1>节日祝福生成器</h1>
        
        <div class="auth-buttons">
            <button id="login-tab" class="active">登录</button>
            <button id="register-tab">注册</button>
        </div>
        
        <div id="login-form" class="form active">
            <div class="form-group">
                <label for="login-username">用户名</label>
                <input type="text" id="login-username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label for="login-password">密码</label>
                <input type="password" id="login-password" placeholder="请输入密码">
            </div>
            <button class="btn" id="login-btn">登录</button>
            <div id="login-message" class="message"></div>
        </div>
        
        <div id="register-form" class="form">
            <div class="form-group">
                <label for="register-username">用户名</label>
                <input type="text" id="register-username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label for="register-password">密码</label>
                <input type="password" id="register-password" placeholder="请输入密码">
            </div>
            <button class="btn" id="register-btn">注册</button>
            <div id="register-message" class="message"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginTab = document.getElementById('login-tab');
            const registerTab = document.getElementById('register-tab');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            
            const loginUsername = document.getElementById('login-username');
            const loginPassword = document.getElementById('login-password');
            const loginBtn = document.getElementById('login-btn');
            const loginMessage = document.getElementById('login-message');
            
            const registerUsername = document.getElementById('register-username');
            const registerPassword = document.getElementById('register-password');
            const registerBtn = document.getElementById('register-btn');
            const registerMessage = document.getElementById('register-message');
            
            // 检查本地存储中的token
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = 'app.html';
            }
            
            // 标签切换
            loginTab.addEventListener('click', function() {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                loginMessage.innerHTML = '';
                registerMessage.innerHTML = '';
            });
            
            registerTab.addEventListener('click', function() {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
                loginMessage.innerHTML = '';
                registerMessage.innerHTML = '';
            });
            
            // 登录
            loginBtn.addEventListener('click', async function() {
                const username = loginUsername.value.trim();
                const password = loginPassword.value;
                
                if (!username || !password) {
                    loginMessage.innerHTML = '<div class="error">用户名和密码不能为空</div>';
                    return;
                }
                
                try {
                    const response = await fetch('http://localhost:3001/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('username', data.username);
                        window.location.href = 'app.html';
                    } else {
                        loginMessage.innerHTML = `<div class="error">${data.error}</div>`;
                    }
                } catch (error) {
                    console.error('登录失败:', error);
                    loginMessage.innerHTML = '<div class="error">登录失败，请稍后重试</div>';
                }
            });
            
            // 注册
            registerBtn.addEventListener('click', async function() {
                const username = registerUsername.value.trim();
                const password = registerPassword.value;
                
                if (!username || !password) {
                    registerMessage.innerHTML = '<div class="error">用户名和密码不能为空</div>';
                    return;
                }
                
                try {
                    const response = await fetch('http://localhost:3001/api/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        registerMessage.innerHTML = '<div class="success">注册成功，请登录</div>';
                        // 切换到登录表单
                        loginTab.click();
                    } else {
                        registerMessage.innerHTML = `<div class="error">${data.error}</div>`;
                    }
                } catch (error) {
                    console.error('注册失败:', error);
                    registerMessage.innerHTML = '<div class="error">注册失败，请稍后重试</div>';
                }
            });
        });
    </script>
</body>
</html>
